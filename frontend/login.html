<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dashboard de Control IT</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- <link href="libs/font_awesome.css" rel="stylesheet"> -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #f1f8e8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .logo-text {
            font-size: 28px;
            font-weight: bold;
            color: #ff6b47;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(255, 107, 71, 0.2);
        }

        .logo-subtitle {
            font-size: 14px;
            color: #718096;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-container {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 18px;
        }

        .form-input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
        }

        .form-input:focus {
            outline: none;
            border-color: #ff6b47;
            box-shadow: 0 0 0 3px rgba(255, 107, 71, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff6b47, #ff4f2a);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(255, 107, 71, 0.4);
        }

        .login-button:hover {
            background: linear-gradient(135deg, #ff4f2a, #e63917);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 107, 71, 0.5);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .login-button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            background: #fed7d7;
            border: 2px solid #fc8181;
            color: #742a2a;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 600;
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .success-message {
            background: #c6f6d5;
            border: 2px solid #68d391;
            color: #22543d;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            font-weight: 600;
        }

        .success-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info-box {
            background: rgba(255, 107, 71, 0.08);
            border: 2px solid rgba(255, 107, 71, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-top: 25px;
            font-size: 13px;
            color: #2c5282;
        }

        .info-box-title {
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ff6b47;
        }

        .info-box ul {
            list-style: none;
            padding-left: 0;
        }

        .info-box li {
            margin: 5px 0;
            padding-left: 20px;
            position: relative;
            color: #4a5568;
        }

        .info-box li::before {
            content: "→";
            position: absolute;
            left: 0;
            font-weight: bold;
            color: #ff6b47;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 40px 30px;
            }

            .logo-text {
                font-size: 24px;
            }

            .logo-icon {
                width: 100px;
                height: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo-container">
            <i class="fas fa-boxes logo-icon" style="font-size: 80px; color: #ff6b47; margin-bottom: 20px;"></i>
            <div class="logo-text">Dashboard de Control</div>
            <div class="logo-subtitle">Sistema de Monitorización de Mesas</div>
        </div>

        <div id="error-message" class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span id="error-text"></span>
        </div>

        <div id="success-message" class="success-message">
            <i class="fas fa-check-circle"></i>
            <span id="success-text"></span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label class="form-label" for="username">Usuario</label>
                <div class="input-container">
                    <i class="input-icon fas fa-user"></i>
                    <input type="text" id="username" class="form-input" placeholder="Ingresa tu usuario"
                        autocomplete="username" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="input-container">
                    <i class="input-icon fas fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="Ingresa tu contraseña"
                        autocomplete="current-password" required>
                </div>
            </div>

            <button type="submit" id="login-button" class="login-button">
                <i class="fas fa-sign-in-alt"></i>
                <span>Iniciar Sesión</span>
            </button>
        </form>

        <div class="info-box">
            <div class="info-box-title">
                <i class="fas fa-info-circle"></i>
                Tipos de Usuario
            </div>
            <ul>
                <li><strong>IT Admin:</strong> Acceso completo al sistema</li>
                <li><strong>Supervisor:</strong> Visualización y reportes</li>
            </ul>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        const form = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('login-button');
        const errorMessage = document.getElementById('error-message');
        const errorText = document.getElementById('error-text');
        const successMessage = document.getElementById('success-message');
        const successText = document.getElementById('success-text');

        // Verificar si ya hay sesión activa
        checkSession();

        async function checkSession() {
            try {
                const response = await fetch(`${API_URL}/api/session`, {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.authenticated) {
                    showSuccess('Ya tienes sesión activa. Redirigiendo...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                }
            } catch (error) {
                console.log('No hay sesión activa');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                showError('Por favor completa todos los campos');
                return;
            }

            await login(username, password);
        });

        async function login(username, password) {
            // Deshabilitar botón y mostrar loading
            loginButton.disabled = true;

            // 🔧 CORRECCIÓN: Guardar el contenido HTML original
            const originalButtonContent = loginButton.innerHTML;
            loginButton.innerHTML = '<div class="spinner"></div> Iniciando sesión...';

            hideError();
            hideSuccess();

            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess(`¡Bienvenido ${data.user.nombre_completo}!`);

                    // Redirigir después de 1 segundo
                    setTimeout(() => {
                        window.location.href = data.redirect || '/';
                    }, 1000);
                } else {
                    showError(data.error || 'Error al iniciar sesión');
                    // 🔧 CORRECCIÓN: Restaurar contenido original del botón
                    loginButton.disabled = false;
                    loginButton.innerHTML = originalButtonContent;
                }

            } catch (error) {
                console.error('Error de conexión:', error);
                showError('Error de conexión con el servidor');
                // 🔧 CORRECCIÓN: Restaurar contenido original del botón
                loginButton.disabled = false;
                loginButton.innerHTML = originalButtonContent;
            }
        }

        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMessage.classList.add('show');
        }

        function hideSuccess() {
            successMessage.classList.remove('show');
        }

        // Ocultar mensajes al escribir
        usernameInput.addEventListener('input', () => {
            hideError();
            hideSuccess();
        });

        passwordInput.addEventListener('input', () => {
            hideError();
            hideSuccess();
        });
    </script>
</body>

</html>
